<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Redone{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #080808;
      --surface:     #0f0f0f;
      --surface-2:   #161616;
      --border:      #1f1f1f;
      --border-2:    #2a2a2a;
      --amber:       #f5a623;
      --amber-dim:   rgba(245,166,35,0.12);
      --amber-glow:  rgba(245,166,35,0.3);
      --green:       #3ddc84;
      --red:         #ff4d4d;
      --text:        #f0ece4;
      --text-2:      #888880;
      --text-3:      #444440;
      --font-sans:   'Syne', sans-serif;
      --font-mono:   'DM Mono', monospace;
      --radius:      4px;
    }

    html { font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Noise grain overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025;
      pointer-events: none;
      z-index: 100;
    }

    a { color: var(--amber); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Layout ── */
    .layout {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ── Nav ── */
    nav {
      border-bottom: 1px solid var(--border);
      padding: 18px 0;
    }
    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo {
      font-family: var(--font-sans);
      font-weight: 800;
      font-size: 18px;
      letter-spacing: -0.02em;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-logo .dot {
      width: 7px; height: 7px;
      background: var(--amber);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--amber-glow);
      animation: breathe 2.4s ease-in-out infinite;
    }
    @keyframes breathe {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.5; transform: scale(0.75); }
    }
    .nav-meta {
      font-size: 11px;
      color: var(--text-3);
      letter-spacing: 0.08em;
    }

    {% block extra_styles %}{% endblock %}
  </style>
</head>
<body>
  <nav>
    <div class="layout nav-inner">
      <div class="nav-logo">
        <span class="dot"></span>
        REDONE
      </div>
      <div class="nav-meta">FLASK + REDIS</div>
    </div>
  </nav>

  {% block content %}{% endblock %}

  {% block scripts %}{% endblock %}
</body>
</html>
